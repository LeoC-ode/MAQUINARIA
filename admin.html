<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Admin Dashboard | Maintenance Core</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="assets/tailwind-config.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  body { font-family: 'Public Sans', sans-serif; min-height: max(884px, 100dvh); }
</style>
</head>
<body class="bg-surface text-on-surface flex flex-col min-h-screen" data-page="admin">

<main class="flex-1 md:ml-64 pt-20 p-6">
  <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
    <div>
      <h2 class="text-h2 font-h2 text-on-surface">Service Management</h2>
      <p class="text-body-md text-secondary mt-1">Review and manage active maintenance requests from the fleet.</p>
    </div>
    <div class="flex gap-2">
      <button id="btn-reset" class="border border-outline-variant text-secondary px-4 py-3 rounded flex items-center justify-center gap-2 font-label-sm text-label-sm hover:bg-surface-container-low transition-colors">
        <span class="material-symbols-outlined">restart_alt</span>
        RESET DATA
      </button>
      <button id="btn-create" class="bg-primary hover:brightness-110 text-white px-6 py-3 rounded flex items-center justify-center gap-2 font-label-sm text-label-sm transition-all shadow-sm active:opacity-80">
        <span class="material-symbols-outlined">add_circle</span>
        CREATE NEW SERVICE
      </button>
    </div>
  </div>

  <!-- Stats -->
  <div class="grid grid-cols-1 md:grid-cols-4 gap-gutter mb-8" id="stats-grid"></div>

  <!-- Search & filter -->
  <div class="bg-white border border-outline-variant rounded shadow-sm p-4 mb-4 flex flex-col md:flex-row gap-3">
    <input id="search-input" type="text" placeholder="Search by code, customer, or machine..."
      class="flex-1 h-10 px-3 border border-outline-variant rounded text-sm focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none">
    <select id="status-filter" class="h-10 px-3 border border-outline-variant rounded text-sm focus:border-primary outline-none">
      <option value="">All statuses</option>
      <option value="in-progress">In Progress</option>
      <option value="critical">Critical</option>
      <option value="scheduled">Scheduled</option>
      <option value="hold">Hold</option>
      <option value="completed">Completed</option>
    </select>
  </div>

  <!-- Desktop table -->
  <div class="hidden lg:block bg-white border border-outline-variant rounded shadow-sm overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full text-left border-collapse">
        <thead>
          <tr class="bg-surface-container-low border-b border-outline-variant">
            <th class="px-6 py-4 font-label-sm text-label-sm text-secondary uppercase tracking-wider">Tracking Code</th>
            <th class="px-6 py-4 font-label-sm text-label-sm text-secondary uppercase tracking-wider">Customer Name</th>
            <th class="px-6 py-4 font-label-sm text-label-sm text-secondary uppercase tracking-wider">Machine</th>
            <th class="px-6 py-4 font-label-sm text-label-sm text-secondary uppercase tracking-wider">Status</th>
            <th class="px-6 py-4 font-label-sm text-label-sm text-secondary uppercase tracking-wider text-right">Actions</th>
          </tr>
        </thead>
        <tbody id="services-tbody" class="divide-y divide-outline-variant"></tbody>
      </table>
    </div>
  </div>

  <!-- Mobile card list -->
  <div id="services-cards" class="lg:hidden flex flex-col gap-4"></div>
</main>

<!-- Modal -->
<div id="modal" class="hidden fixed inset-0 z-50 bg-black/40 flex items-center justify-center p-4">
  <div class="bg-white rounded-xl shadow-xl w-full max-w-lg max-h-[90vh] overflow-y-auto">
    <div class="flex items-center justify-between border-b border-outline-variant px-6 py-4">
      <h3 id="modal-title" class="font-h3 text-h3">New Service</h3>
      <button id="modal-close" class="text-secondary hover:text-on-surface">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>
    <form id="service-form" class="p-6 flex flex-col gap-4">
      <input type="hidden" name="originalCode">

      <label class="flex flex-col gap-1">
        <span class="font-label-sm text-label-sm text-secondary uppercase">Tracking Code</span>
        <input name="code" required type="text" placeholder="MC-1234"
          class="h-10 px-3 border border-outline-variant rounded text-sm focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none">
      </label>

      <label class="flex flex-col gap-1">
        <span class="font-label-sm text-label-sm text-secondary uppercase">Customer</span>
        <input name="customer" required type="text"
          class="h-10 px-3 border border-outline-variant rounded text-sm focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none">
      </label>

      <label class="flex flex-col gap-1">
        <span class="font-label-sm text-label-sm text-secondary uppercase">Machine</span>
        <input name="machine" required type="text"
          class="h-10 px-3 border border-outline-variant rounded text-sm focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none">
      </label>

      <div class="grid grid-cols-2 gap-3">
        <label class="flex flex-col gap-1">
          <span class="font-label-sm text-label-sm text-secondary uppercase">Service Type</span>
          <input name="serviceType" type="text" placeholder="Repair / Inspection..."
            class="h-10 px-3 border border-outline-variant rounded text-sm focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none">
        </label>
        <label class="flex flex-col gap-1">
          <span class="font-label-sm text-label-sm text-secondary uppercase">Status</span>
          <select name="status"
            class="h-10 px-3 border border-outline-variant rounded text-sm focus:border-primary outline-none">
            <option value="scheduled">Scheduled</option>
            <option value="in-progress">In Progress</option>
            <option value="critical">Critical</option>
            <option value="hold">Hold</option>
            <option value="completed">Completed</option>
          </select>
        </label>
      </div>

      <label class="flex flex-col gap-1">
        <span class="font-label-sm text-label-sm text-secondary uppercase">Technician</span>
        <input name="technician" type="text"
          class="h-10 px-3 border border-outline-variant rounded text-sm focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none">
      </label>

      <label class="flex flex-col gap-1">
        <span class="font-label-sm text-label-sm text-secondary uppercase">Notes</span>
        <textarea name="notes" rows="3"
          class="px-3 py-2 border border-outline-variant rounded text-sm focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none"></textarea>
      </label>

      <div class="flex justify-between gap-3 pt-2 border-t border-outline-variant mt-2">
        <button type="button" id="btn-delete" class="hidden text-error border border-error px-4 py-2 rounded font-label-sm text-label-sm uppercase tracking-wider hover:bg-error/10">
          Delete
        </button>
        <div class="flex gap-3 ml-auto">
          <button type="button" id="btn-cancel" class="text-secondary px-4 py-2 rounded font-label-sm text-label-sm uppercase tracking-wider hover:bg-surface-container-low">
            Cancel
          </button>
          <button type="submit" class="bg-primary text-white px-4 py-2 rounded font-label-sm text-label-sm uppercase tracking-wider hover:brightness-110">
            Save
          </button>
        </div>
      </div>
    </form>
  </div>
</div>

<script src="assets/app.js"></script>
<script>
  const tbody       = document.getElementById("services-tbody");
  const cards       = document.getElementById("services-cards");
  const statsGrid   = document.getElementById("stats-grid");
  const modal       = document.getElementById("modal");
  const modalTitle  = document.getElementById("modal-title");
  const form        = document.getElementById("service-form");
  const btnCreate   = document.getElementById("btn-create");
  const btnCancel   = document.getElementById("btn-cancel");
  const btnDelete   = document.getElementById("btn-delete");
  const btnReset    = document.getElementById("btn-reset");
  const modalClose  = document.getElementById("modal-close");
  const searchInput = document.getElementById("search-input");
  const statusFilter= document.getElementById("status-filter");

  function renderStats(list) {
    const pending = list.filter(s => s.status === "in-progress" || s.status === "scheduled").length;
    const critical = list.filter(s => s.status === "critical").length;
    const completed = list.filter(s => s.status === "completed").length;
    const efficiency = list.length ? Math.round((completed / list.length) * 100) : 0;
    statsGrid.innerHTML = `
      <div class="bg-white p-6 border border-outline-variant shadow-sm rounded flex flex-col gap-2">
        <span class="text-caption font-label-sm text-secondary uppercase tracking-widest">Total Requests</span>
        <span class="text-display font-display text-on-surface">${list.length}</span>
        <div class="flex items-center gap-1 text-secondary text-caption font-bold">
          <span class="material-symbols-outlined text-sm">inventory_2</span>
          Across all customers
        </div>
      </div>
      <div class="bg-white p-6 border border-outline-variant shadow-sm rounded flex flex-col gap-2">
        <span class="text-caption font-label-sm text-secondary uppercase tracking-widest">Pending</span>
        <span class="text-display font-display text-orange-600">${pending}</span>
        <div class="w-full bg-surface-container h-1 rounded overflow-hidden">
          <div class="bg-orange-600 h-full" style="width:${list.length ? (pending/list.length*100) : 0}%"></div>
        </div>
      </div>
      <div class="bg-white p-6 border border-outline-variant shadow-sm rounded flex flex-col gap-2">
        <span class="text-caption font-label-sm text-secondary uppercase tracking-widest">Critical Alert</span>
        <span class="text-display font-display text-error">${critical}</span>
        <div class="flex items-center gap-1 text-error text-caption font-bold">
          <span class="material-symbols-outlined text-sm">warning</span>
          ${critical ? "Immediate Action Required" : "All clear"}
        </div>
      </div>
      <div class="bg-zinc-900 text-white p-6 border border-zinc-800 shadow-xl rounded relative overflow-hidden flex flex-col justify-between">
        <div class="z-10">
          <span class="text-caption font-label-sm text-zinc-400 uppercase tracking-widest">Completion Rate</span>
          <span class="text-display font-display text-white block">${efficiency}%</span>
        </div>
        <div class="absolute -right-4 -bottom-4 opacity-10">
          <span class="material-symbols-outlined" style="font-size:80px">speed</span>
        </div>
      </div>`;
  }

  function rowHtml(s) {
    const meta = STATUS_META[s.status] || STATUS_META["hold"];
    return `
      <tr class="hover:bg-surface-variant transition-colors group">
        <td class="px-6 py-4 font-body-md text-on-surface font-semibold tracking-tight">
          <a class="hover:text-primary hover:underline" href="service-details.html?code=${encodeURIComponent(s.code)}">${s.code}</a>
        </td>
        <td class="px-6 py-4 font-body-md text-on-surface">${s.customer}</td>
        <td class="px-6 py-4 font-body-md text-on-surface">${s.machine}</td>
        <td class="px-6 py-4">
          <span class="px-3 py-1 ${meta.badge} text-xs font-bold rounded-full uppercase">${meta.label}</span>
        </td>
        <td class="px-6 py-4 text-right">
          <button data-edit="${s.code}" class="text-primary hover:underline font-label-sm inline-flex items-center gap-1 group-hover:scale-105 transition-transform">
            <span class="material-symbols-outlined text-sm">edit</span> EDIT
          </button>
        </td>
      </tr>`;
  }

  function cardHtml(s) {
    const meta = STATUS_META[s.status] || STATUS_META["hold"];
    const borderClass = s.status === "critical" ? "border-l-4 border-l-error" : "";
    return `
      <div class="bg-white p-4 border border-outline-variant rounded shadow-sm ${borderClass}">
        <div class="flex justify-between items-start mb-2">
          <a class="font-body-md font-bold text-on-surface hover:text-primary" href="service-details.html?code=${encodeURIComponent(s.code)}">${s.code}</a>
          <span class="px-2 py-0.5 ${meta.badge} text-[10px] font-bold rounded uppercase">${meta.label}</span>
        </div>
        <div class="mb-3">
          <p class="text-caption text-secondary uppercase font-bold tracking-tighter">Customer</p>
          <p class="text-body-md text-on-surface">${s.customer}</p>
        </div>
        <div class="mb-3">
          <p class="text-caption text-secondary uppercase font-bold tracking-tighter">Machine</p>
          <p class="text-body-md text-on-surface">${s.machine}</p>
        </div>
        <button data-edit="${s.code}" class="w-full bg-surface-container hover:bg-surface-variant text-primary py-2 rounded font-label-sm flex items-center justify-center gap-2">
          <span class="material-symbols-outlined text-sm">edit</span> EDIT REQUEST
        </button>
      </div>`;
  }

  function applyFilters(list) {
    const q = searchInput.value.trim().toLowerCase();
    const status = statusFilter.value;
    return list.filter(s => {
      if (status && s.status !== status) return false;
      if (q) {
        const blob = (s.code + " " + s.customer + " " + s.machine).toLowerCase();
        if (!blob.includes(q)) return false;
      }
      return true;
    });
  }

  function render() {
    const all = loadServices();
    renderStats(all);
    const filtered = applyFilters(all);
    if (filtered.length === 0) {
      tbody.innerHTML = `<tr><td colspan="5" class="px-6 py-12 text-center text-secondary">No services match your filters.</td></tr>`;
      cards.innerHTML = `<div class="bg-white p-6 border border-outline-variant rounded text-center text-secondary">No services match your filters.</div>`;
      return;
    }
    tbody.innerHTML = filtered.map(rowHtml).join("");
    cards.innerHTML = filtered.map(cardHtml).join("");
  }

  // ----- Modal -----
  function openModal(service) {
    form.reset();
    btnDelete.classList.toggle("hidden", !service);
    if (service) {
      modalTitle.textContent = `Edit ${service.code}`;
      form.elements.originalCode.value = service.code;
      form.elements.code.value = service.code;
      form.elements.customer.value = service.customer;
      form.elements.machine.value = service.machine;
      form.elements.serviceType.value = service.serviceType || "";
      form.elements.status.value = service.status;
      form.elements.technician.value = service.technician || "";
      form.elements.notes.value = service.notes || "";
    } else {
      modalTitle.textContent = "New Service";
      form.elements.originalCode.value = "";
      form.elements.status.value = "scheduled";
    }
    modal.classList.remove("hidden");
  }

  function closeModal() { modal.classList.add("hidden"); }

  // ----- Events -----
  btnCreate.addEventListener("click", () => openModal(null));
  btnCancel.addEventListener("click", closeModal);
  modalClose.addEventListener("click", closeModal);
  modal.addEventListener("click", e => { if (e.target === modal) closeModal(); });

  btnReset.addEventListener("click", () => {
    if (!confirm("Reset all data to defaults? This will erase your changes.")) return;
    localStorage.removeItem(STORAGE_KEY);
    render();
  });

  btnDelete.addEventListener("click", () => {
    const original = form.elements.originalCode.value;
    if (!original) return;
    if (!confirm(`Delete service ${original}? This cannot be undone.`)) return;
    deleteService(original);
    closeModal();
    render();
  });

  form.addEventListener("submit", e => {
    e.preventDefault();
    const data = Object.fromEntries(new FormData(form).entries());
    const originalCode = data.originalCode || null;
    if (!data.code.trim()) return;

    const existing = originalCode ? findService(originalCode) : null;
    const svc = {
      code: data.code.trim().toUpperCase(),
      customer: data.customer.trim(),
      machine: data.machine.trim(),
      serviceType: data.serviceType.trim() || "General",
      status: data.status,
      technician: data.technician.trim(),
      lastUpdate: new Date().toISOString(),
      notes: data.notes.trim(),
      tasks: existing ? existing.tasks : []
    };

    // Prevent duplicate codes when creating new
    if (!originalCode && findService(svc.code)) {
      alert(`A service with code ${svc.code} already exists.`);
      return;
    }
    upsertService(svc, originalCode);
    closeModal();
    render();
  });

  document.addEventListener("click", e => {
    const btn = e.target.closest("[data-edit]");
    if (!btn) return;
    const svc = findService(btn.dataset.edit);
    if (svc) openModal(svc);
  });

  searchInput.addEventListener("input", render);
  statusFilter.addEventListener("change", render);

  document.addEventListener("DOMContentLoaded", render);
</script>
</body>
</html>
